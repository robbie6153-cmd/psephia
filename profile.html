<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Psephia</title>
  <link rel="stylesheet" href="./style.css?v=14" />
</head>

<body>
  <div class="top-bar">
    <button class="menu-button" onclick="toggleMenu()">☰</button>

    <div class="category-tabs">
      <a href="app.html" class="category-tab">Back to Polls</a>
    </div>

    <div id="dropdownMenu" class="dropdown-menu">
      <a href="index.html" onclick="closeMenu()">Home</a>
      <a href="profile.html" onclick="closeMenu()">My Profile</a>
      <a href="community.html" onclick="closeMenu()">Community Guidelines</a>
      <a href="privacy.html" onclick="closeMenu()">Privacy Policy</a>
      <a href="terms.html" onclick="closeMenu()">Terms of Use</a>
    </div>
  </div>

  <main class="app-page">
    <h1>My Profile</h1>

    <section id="profileAuthView">
      <div class="card">
        <h2>Account</h2>

        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />

        <button id="signUpBtn" type="button">Create Account</button>
        <button id="loginBtn" type="button">Log In</button>
        <button id="forgotPasswordBtn" type="button">Forgot Password?</button>

        <p id="loginMessage"></p>
      </div>
    </section>

    <section id="profileLoggedInView" class="hidden">
      <div class="card">
        <h2>My Details</h2>

        <div class="profile-section-header">
          <button id="editDetailsBtn" type="button" class="icon-button">✏️ Edit Details</button>
        </div>

        <input id="profileFirstName" type="text" placeholder="First name" disabled />
        <input id="profileLastName" type="text" placeholder="Last name" disabled />
        <input id="profileCountry" type="text" placeholder="Country" disabled />
        <input id="profileUsername" type="text" placeholder="Username" disabled />

        <button id="saveProfileDetailsBtn" type="button" class="hidden">Save Changes</button>
        <p id="profileMessage"></p>
      </div>

      <div class="card">
        <h2>My Polls</h2>
        <div id="myPollsList"></div>
      </div>

      <div class="card">
        <h2>Account</h2>
        <button id="logoutBtn" type="button">Log Out</button>
        <button id="switchAccountBtn" type="button">Switch Account</button>
      </div>

      <div class="card danger-card">
        <h2>Delete Profile</h2>
        <p>
          Deleting your profile will permanently remove your profile and any polls you have created.
          Your votes will also be discounted.
        </p>
        <button id="deleteProfileBtn" type="button" class="danger-button">Delete Profile</button>
        <p id="deleteProfileMessage"></p>
      </div>
    </section>
  </main>

 <script type="module" src="./auth.js?v=19"></script>
</body>
</html>
