<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psephia App</title>
 <link rel="stylesheet" href="./style.css?v=13" />
</head>

<body>
  <div class="top-bar">
    <button class="menu-button" onclick="toggleMenu()">☰</button>

    <div class="category-tabs" id="categoryTabs">
      <button class="category-tab active" type="button" data-category="Politics">Politics</button>
      <button class="category-tab" type="button" data-category="Sport">Sport</button>
      <button class="category-tab" type="button" data-category="Entertainment">Entertainment</button>
      <button class="category-tab" type="button" data-category="Food and Drink">Food and Drink</button>
      <button class="category-tab" type="button" data-category="History">History</button>
      <button class="category-tab" type="button" data-category="Religion">Religion</button>
      <button class="category-tab" type="button" data-category="Science">Science</button>
      <button class="category-tab" type="button" data-category="Law/Crime">Law/Crime</button>
      <button class="category-tab" type="button" data-category="Other">Other</button>
      <a href="private.html" class="category-tab">Private</a>
    </div>

            <div id="dropdownMenu" class="dropdown-menu">
      <a href="index.html" onclick="closeMenu()">Home</a>
      <a href="profile.html" onclick="closeMenu()">My Profile</a>
      <a href="community.html" onclick="closeMenu()">Community Guidelines</a>
      <a href="privacy.html" onclick="closeMenu()">Privacy Policy</a>
      <a href="terms.html" onclick="closeMenu()">Terms of Use</a>
    </div>
  </div>

  <div class="category-more-hint">← Swipe for more categories →</div>

  <main class="app-page hidden-until-ready">
    <h1>Psephia</h1>

    <section id="userDetailsView" class="hidden">
      <div class="card">
        <h2>Your Details</h2>
        <p>Please complete your details before using Psephia.</p>

        <input id="firstName" type="text" placeholder="First name" />
        <input id="lastName" type="text" placeholder="Last name" />
        <input id="country" type="text" placeholder="Country" />
        <input id="username" type="text" placeholder="Choose a username" />

        <button id="saveDetailsBtn" type="button">Save Details</button>
        <p id="detailsMessage"></p>
      </div>
    </section>

  <section id="pollsView">
  <div id="pollsCard" class="card polls-card mode-open">
    <h2>Polls</h2>

    <div class="poll-folder-tabs">
      <button id="openPollsTab" class="poll-folder-tab active" type="button">Polls (Open)</button>
      <button id="resultsPollsTab" class="poll-folder-tab" type="button">Polls (Results)</button>
    </div>

    <div id="voteMessage" style="display:none; margin-bottom:16px; padding:12px;"></div>

    <div id="polls"></div>
  </div>
</section>

    <section id="createPollView" class="hidden">
      <div class="card">
        <h2>Create Poll</h2>

        <label for="createPollCategory">Select category</label>
        <select id="createPollCategory">
          <option value="Politics">Politics</option>
          <option value="Sport">Sport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Food and Drink">Food and Drink</option>
          <option value="History">History</option>
          <option value="Religion">Religion</option>
          <option value="Science">Science</option>
          <option value="Law/Crime">Law/Crime</option>
          <option value="Other">Other</option>
          <option value="Private">Private</option>
        </select>

        <label for="pollDuration">How long do you want this poll to be posted?</label>
        <select id="pollDuration">
          <option value="1">1 day</option>
          <option value="2">2 days</option>
          <option value="3">3 days</option>
          <option value="4">4 days</option>
          <option value="5">5 days</option>
          <option value="6">6 days</option>
          <option value="7">7 days</option>
        </select>

        <input id="pollQuestion" type="text" placeholder="Question" />
        <input class="poll-option" type="text" placeholder="Option 1" />
        <input class="poll-option" type="text" placeholder="Option 2" />

        <button id="addOptionBtn" type="button">Add another option</button>

        <div id="extraOptions"></div>

        <div class="create-actions">
          <button id="cancelCreatePollBtn" type="button">Cancel</button>
          <button id="submitPollBtn" type="button">Create</button>
        </div>
      </div>
    </section>

    <button id="openCreatePollBtn" class="floating-create-btn" type="button">
      <span class="plus">+</span>
      <span>Create Poll</span>
    </button>
  </main>

  <script type="module" src="./script.js?v=13"></script>
</body>
</html>
