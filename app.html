<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psephia App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="menu-wrapper">
    <button class="menu-button" onclick="toggleMenu()">☰</button>

    <div id="dropdownMenu" class="dropdown-menu">
      <a href="index.html">Home</a>
      <a href="profile.html">My Profile</a>
      <a href="community-guidelines.html">Community Guidelines</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
    </div>
  </div>

  <main class="app-page hidden-until-ready"></main>
    <h1>Psephia</h1>

    <div class="card">
  <h2>Account</h2>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button id="signUpBtn">Create Account</button>
  <button id="loginBtn">Log In</button>
  <button id="forgotPasswordBtn">Forgot Password?</button>
  <button id="logout" style="display:none;">Log Out</button>

  <p id="status">Not logged in</p>
  <p id="loginMessage"></p>
</div>

    <div id="createPoll" class="card" style="display:none;">
      <h2>Create Poll</h2>
      <input id="question" placeholder="Question" />
      <input id="option1" placeholder="Option 1" />
      <input id="option2" placeholder="Option 2" />
      <button id="create">Create</button>
    </div>

    <div id="pollsCard" class="card" style="display:none;">
  <h2>Polls</h2>

  <div id="voteMessage" style="display:none; margin-bottom:16px; padding:12px; background:#fff3f3; color:#b00020; border:1px solid #e0b4b4; border-radius:8px;"></div>

  <div id="polls"></div>
</div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
