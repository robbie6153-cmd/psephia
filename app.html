<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psephia App</title>

  <style>
    body {
      font-family: Georgia, serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f7f7;
    }

    .card {
      background: white;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    input, button {
      padding: 10px;
      margin: 6px 0;
      font-size: 16px;
    }

    input {
      width: 100%;
      max-width: 400px;
    }

    .poll {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Psephia</h1>

<div class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button id="signup">Sign Up</button>
  <button id="login">Log In</button>
  <button id="logout">Log Out</button>
  <p id="status">Not logged in</p>
</div>

<div id="createPoll" class="card" style="display:none;">
  <h2>Create Poll</h2>
  <input id="question" placeholder="Question">
  <input id="option1" placeholder="Option 1">
  <input id="option2" placeholder="Option 2">
  <button id="create">Create</button>
</div>

<div class="card">
  <h2>Polls</h2>
  <div id="polls"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore, collection, addDoc, getDocs, Timestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB26YRL03IuiYtFFc3_aweQ8EDe8_DWUd0",
  authDomain: "psephia-9807e.firebaseapp.com",
  projectId: "psephia-9807e",
  storageBucket: "psephia-9807e.firebasestorage.app",
  messagingSenderId: "1085776731080",
  appId: "1:1085776731080:web:ef9dade729d7f043b7befd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// auth
signup.onclick = () =>
  createUserWithEmailAndPassword(auth, email.value, password.value);

login.onclick = () =>
  signInWithEmailAndPassword(auth, email.value, password.value);

logout.onclick = () => signOut(auth);

onAuthStateChanged(auth, user => {
  status.textContent = user ? "Logged in: " + user.email : "Not logged in";
  createPoll.style.display = user ? "block" : "none";
  loadPolls();
});

// create poll
create.onclick = async () => {
  await addDoc(collection(db, "polls"), {
    question: question.value,
    options: [option1.value, option2.value],
    createdAt: Timestamp.now()
  });

  loadPolls();
};

// load polls
async function loadPolls() {
  const snap = await getDocs(collection(db, "polls"));
  polls.innerHTML = "";

  snap.forEach(doc => {
    const p = doc.data();
    polls.innerHTML += `
      <div class="poll">
        <strong>${p.question}</strong><br>
        ${p.options[0]}<br>
        ${p.options[1]}
      </div>
    `;
  });
}
</script>

</body>
</html>
