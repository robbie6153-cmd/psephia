<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psephia App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="menu-wrapper">
    <button class="menu-button" onclick="toggleMenu()">☰</button>

    <div id="dropdownMenu" class="dropdown-menu">
      <a href="index.html">Home</a>
      <a href="profile.html">My Profile</a>
      <a href="community-guidelines.html">Community Guidelines</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
    </div>
  </div>

  <main class="app-page">
    <h1>Psephia</h1>

    <div class="card">
      <h2>Login</h2>
      <input id="email" type="email" placeholder="Email" />
      <button id="sendLink">Sign Up / Log In by Email</button>
      <button id="logout" style="display:none;">Log Out</button>
      <p id="status">Not logged in</p>
      <p id="loginMessage"></p>
    </div>

    <div id="yourDetails" class="card" style="display:none;">
      <h2>Your Details</h2>
      <input id="firstName" placeholder="First name" />
      <input id="surname" placeholder="Surname" />
      <input id="country" placeholder="Country" />
      <input id="username" placeholder="Username" />
      <button id="saveProfile">Save Details</button>
      <p id="profileMessage"></p>
    </div>

    <div id="createPoll" class="card" style="display:none;">
      <h2>Create Poll</h2>
      <input id="question" placeholder="Question" />
      <input id="option1" placeholder="Option 1" />
      <input id="option2" placeholder="Option 2" />
      <button id="create">Create</button>
    </div>

    <div id="pollsCard" class="card" style="display:none;">
      <h2>Polls</h2>
      <div id="polls"></div>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
